<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NFL Model Outputs</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 20px;
      background-color: #f4f7f6;
    }

    .last-updated {
      margin-bottom: 10px;
      font-style: italic;
      color: #666;
      font-size: 0.8rem;
    }

    .weather-link a {
      font-size: 1.1rem;
    }

    .controls {
      margin-bottom: 14px;
      display: flex;
      align-items: flex-start;
      gap: 16px;
      flex-wrap: wrap;
    }

    button {
      border: 1px solid #ccc;
      background: #fff;
      border-radius: 6px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    button:hover { background: #f4f4f4; }

    .team-summary {
      font-size: 0.9rem;
      color: #333;
      padding-top: 8px;
    }

    .team-picker {
      width: 360px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.06);
      overflow: hidden;
      margin-top: 10px;
    }

    .team-picker[hidden] { display: none; }

    .team-picker-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px;
      border-bottom: 1px solid #eee;
      background: #fafafa;
      gap: 10px;
      flex-wrap: wrap;
    }

    #teamFilter {
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      width: 220px;
      font-size: 0.9rem;
      background: #fff;
    }

    .team-picker-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .team-list {
      max-height: 220px;
      overflow: auto;
      padding: 8px 10px;
    }

    .team-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 2px;
      font-size: 0.9rem;
      border-bottom: 1px dashed rgba(0,0,0,0.06);
    }
    .team-item:last-child { border-bottom: none; }

    .team-count {
      font-size: 0.85rem;
      color: #555;
      padding: 8px 10px 10px 10px;
      border-top: 1px solid #eee;
      background: #fafafa;
    }

    .table-container {
      overflow-x: auto;
      overflow-y: auto;
      max-height: 72vh;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      border-radius: 8px;
      background: white;
    }

    table {
      border-collapse: collapse;
      width: auto;
      font-size: 0.85rem;
    }

    th, td {
      padding: 10px;
      text-align: left;
      border-bottom: 1px solid #ddd;
      white-space: nowrap;
      vertical-align: top;
    }

    td.numeric {
      text-align: right;
    }

    table a {
      color: inherit;
      text-decoration: underline;
    }

    table a:hover {
      opacity: 0.75;
    }

    .team-cell {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 3px;
    }

    .team-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .team-logo {
      width: 22px;
      height: 22px;
      object-fit: contain;
      vertical-align: middle;
    }

    .qb-note {
      font-size: 0.72rem;
      line-height: 1.2;
      color: #666;
      white-space: normal;
      font-style: italic;
    }

    th {
      background-color: #2c3e50;
      color: white;
      position: sticky;
      top: 0;
      z-index: 5;
      cursor: pointer;
      user-select: none;
    }

    th:after {
      content: ' \21D5';
      font-size: 0.7rem;
      opacity: 0.5;
    }

    tr:hover td {
      background-color: rgba(0,0,0,0.04) !important;
    }

    .game-group-header td {
      background: #eef3f8;
      border-top: 2px solid #d8e2ee;
      border-bottom: 1px solid #d8e2ee;
      font-weight: 600;
      color: #243447;
    }

    .game-group-title {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
    }

    .game-meta {
      color: #41566e;
      font-weight: 500;
      margin-left: 12px;
      font-size: 0.82rem;
    }

    .team-subrow td:first-child {
      padding-left: 20px;
    }
  </style>
</head>

<body>
  <h2 style="margin-bottom:6px;">NFL Model Outputs</h2>
  <div class="last-updated" id="status">Loading data...</div>
  <div class="last-updated weather-link">
    <a href="https://www.covers.com/sport/nfl/weather" target="_blank" rel="noopener noreferrer">Weather Reports</a>
  </div>

  <div class="controls">
    <div>
      <button type="button" id="toggleTeamPickerBtn" onclick="toggleTeamPicker()">
        Select teams…
      </button>
    </div>
    <div class="team-summary" id="teamSummary">All teams</div>
  </div>

  <div class="team-picker" id="teamPicker" hidden>
    <div class="team-picker-header">
      <input id="teamFilter" type="text" placeholder="Type to find teams..." oninput="onTeamFilterInput()" />
      <div class="team-picker-actions">
        <button type="button" onclick="selectVisibleTeams()">Select visible</button>
        <button type="button" onclick="clearTeamSelection()">Clear</button>
        <button type="button" onclick="toggleTeamPicker(false)">Close</button>
      </div>
    </div>

    <div class="team-list" id="teamList"></div>
    <div class="team-count" id="teamCount">Teams: 0 • Selected: 0</div>
  </div>

  <div class="table-container">
    <table id="oddsTable">
      <thead><tr id="tableHead"></tr></thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <script>
    const SPREADS_CSV_URL = 'https://raw.githubusercontent.com/trashduty/trash-schedule/main/NFL_Odds/Data/spreads_odds.csv';
    const MODEL_CSV_URL = 'https://raw.githubusercontent.com/trashduty/trash-schedule/main/Week%201%20model%20pred_updated.csv';

    const PFR_TEAM_ABBR = {
      ARI: 'crd', ATL: 'atl', BAL: 'rav', BUF: 'buf', CAR: 'car',
      CHI: 'chi', CIN: 'cin', CLE: 'cle', DAL: 'dal', DEN: 'den',
      DET: 'det', GB: 'gnb', HOU: 'htx', IND: 'clt', JAX: 'jax',
      KC: 'kan', LAC: 'sdg', LAR: 'ram', LA: 'ram', LV: 'rai', MIA: 'mia',
      MIN: 'min', NE: 'nwe', NO: 'nor', NYG: 'nyg', NYJ: 'nyj',
      PHI: 'phi', PIT: 'pit', SF: 'sfo', SEA: 'sea', TB: 'tam',
      TEN: 'oti', WAS: 'was',
    };

    const TEAM_INJURY_URLS = {
      ARI: 'https://www.espn.com/nfl/team/injuries/_/name/ari/arizona-cardinals',
      ATL: 'https://www.espn.com/nfl/team/injuries/_/name/atl/atlanta-falcons',
      BAL: 'https://www.espn.com/nfl/team/injuries/_/name/bal/baltimore-ravens',
      BUF: 'https://www.espn.com/nfl/team/injuries/_/name/buf/buffalo-bills',
      CAR: 'https://www.espn.com/nfl/team/injuries/_/name/car/carolina-panthers',
      CHI: 'https://www.espn.com/nfl/team/injuries/_/name/chi/chicago-bears',
      CIN: 'https://www.espn.com/nfl/team/injuries/_/name/cin/cincinnati-bengals',
      CLE: 'https://www.espn.com/nfl/team/injuries/_/name/cle/cleveland-browns',
      DAL: 'https://www.espn.com/nfl/team/injuries/_/name/dal/dallas-cowboys',
      DEN: 'https://www.espn.com/nfl/team/injuries/_/name/den/denver-broncos',
      DET: 'https://www.espn.com/nfl/team/injuries/_/name/det/detroit-lions',
      GB:  'https://www.espn.com/nfl/team/injuries/_/name/gb/green-bay-packers',
      HOU: 'https://www.espn.com/nfl/team/injuries/_/name/hou/houston-texans',
      IND: 'https://www.espn.com/nfl/team/injuries/_/name/ind/indianapolis-colts',
      JAX: 'https://www.espn.com/nfl/team/injuries/_/name/jax/jacksonville-jaguars',
      KC:  'https://www.espn.com/nfl/team/injuries/_/name/kc/kansas-city-chiefs',
      LAC: 'https://www.espn.com/nfl/team/injuries/_/name/lac/los-angeles-chargers',
      LAR: 'https://www.espn.com/nfl/team/injuries/_/name/lar/los-angeles-rams',
      LA:  'https://www.espn.com/nfl/team/injuries/_/name/lar/los-angeles-rams',
      LV:  'https://www.espn.com/nfl/team/injuries/_/name/lv/las-vegas-raiders',
      MIA: 'https://www.espn.com/nfl/team/injuries/_/name/mia/miami-dolphins',
      MIN: 'https://www.espn.com/nfl/team/injuries/_/name/min/minnesota-vikings',
      NE:  'https://www.espn.com/nfl/team/injuries/_/name/ne/new-england-patriots',
      NO:  'https://www.espn.com/nfl/team/injuries/_/name/no/new-orleans-saints',
      NYG: 'https://www.espn.com/nfl/team/injuries/_/name/nyg/new-york-giants',
      NYJ: 'https://www.espn.com/nfl/team/injuries/_/name/nyj/new-york-jets',
      PHI: 'https://www.espn.com/nfl/team/injuries/_/name/phi/philadelphia-eagles',
      PIT: 'https://www.espn.com/nfl/team/injuries/_/name/pit/pittsburgh-steelers',
      SEA: 'https://www.espn.com/nfl/team/injuries/_/name/sea/seattle-seahawks',
      SF:  'https://www.espn.com/nfl/team/injuries/_/name/sf/san-francisco-49ers',
      TB:  'https://www.espn.com/nfl/team/injuries/_/name/tb/tampa-bay-buccaneers',
      TEN: 'https://www.espn.com/nfl/team/injuries/_/name/ten/tennessee-titans',
      WAS: 'https://www.espn.com/nfl/team/injuries/_/name/wsh/washington-commanders',
    };

    const REFRESH_INTERVAL = 60000;
    const EXCLUDED_COLUMNS = new Set(['team_logo_espn', 'last_update_api', 'game_date_est']);
    const EDGE_THRESHOLD_PERCENT = 4;

    let rawData = [];
    let allTeams = [];
    let selectedTeams = new Set();
    let sortConfig = { key: null, direction: 'asc' };
    let columnMapping = [];
    let qbLookup = {};

    function parseCsvFromUrl(url) {
      return fetch(url + '?t=' + Date.now())
        .then(response => {
          if (!response.ok) throw new Error('HTTP ' + response.status + ' for ' + url);
          return response.text();
        })
        .then(csvText => new Promise((resolve, reject) => {
          Papa.parse(csvText, {
            header: true,
            dynamicTyping: true,
            skipEmptyLines: true,
            complete: results => resolve(results),
            error: err => reject(err)
          });
        }));
    }

    function normalizeTeamAbbr(team) {
      return (team || '').toString().trim().toUpperCase();
    }

    function normalizeName(name) {
      return (name || '').toString().trim();
    }

    function buildQbLookup(modelRows) {
      const lookup = {};
      modelRows.forEach(row => {
        const team = normalizeTeamAbbr(row['Team']);
        const qbName = normalizeName(row['Qbname']);
        if (!team || !qbName) return;
        lookup[team] = qbName;
      });
      return lookup;
    }

    function formatHeader(csvHeader) {
      if (csvHeader === 'game_time_est') return 'Game Time';
      return csvHeader
        .split('_')
        .map(word => word.charAt(0).toUpperCase() + word.slice(1))
        .join(' ');
    }

    function inferType(csvKey) {
      const k = csvKey.toLowerCase();
      if (k.includes('probability')) return 'probability';
      if (k.includes('edge')) return 'spread_edge';
      if (['week', 'game', 'team', 'game_time_est'].includes(k) || k.includes('book')) return 'text';
      return 'decimal';
    }

    function buildColumnMapping(headers) {
      const mapped = headers
        .filter(h => !EXCLUDED_COLUMNS.has(h))
        .map(h => ({
          csv: h,
          display: formatHeader(h),
          type: inferType(h)
        }));

      if (!headers.includes('lookahead_line')) {
        const mlIdx = mapped.findIndex(c => c.csv === 'market_line');
        if (mlIdx !== -1) {
          mapped.splice(mlIdx + 1, 0, {
            csv: 'lookahead_line',
            display: 'Lookahead Line',
            type: 'decimal'
          });
        }
      }

      const edgeIdx = mapped.findIndex(c => c.csv === 'edge');
      const gameTimeIdx = mapped.findIndex(c => c.csv === 'game_time_est');
      if (edgeIdx !== -1 && gameTimeIdx !== -1) {
        const [edgeCol] = mapped.splice(edgeIdx, 1);
        const updatedGameTimeIdx = mapped.findIndex(c => c.csv === 'game_time_est');
        mapped.splice(updatedGameTimeIdx + 1, 0, edgeCol);
      }

      const marketLineIdx = mapped.findIndex(c => c.csv === 'market_line');
      const modelPredictionIdx = mapped.findIndex(c => c.csv === 'model_prediction');
      if (marketLineIdx !== -1 && modelPredictionIdx !== -1) {
        const [marketLineCol] = mapped.splice(marketLineIdx, 1);
        const updatedModelPredictionIdx = mapped.findIndex(c => c.csv === 'model_prediction');
        mapped.splice(updatedModelPredictionIdx, 0, marketLineCol);
      }

      columnMapping = mapped;
    }

    function toggleTeamPicker(forceOpen) {
      const picker = document.getElementById('teamPicker');
      const isHidden = picker.hasAttribute('hidden');
      const open = (typeof forceOpen === 'boolean') ? forceOpen : isHidden;
      if (open) {
        picker.removeAttribute('hidden');
        setTimeout(() => document.getElementById('teamFilter')?.focus(), 0);
      } else {
        picker.setAttribute('hidden', '');
      }
    }

    function getEdgeGradientColor(value, thresholdPctPoints) {
      const pct = value * 100;
      const diff = pct - thresholdPctPoints;
      if (diff >= 0) {
        const lightness = Math.max(95 - diff * 8, 30);
        return `hsl(120, 70%, ${lightness}%)`;
      }
      const lightness = Math.max(95 - Math.abs(diff) * 8, 75);
      return `hsl(0, 80%, ${lightness}%)`;
    }

    function formatValue(value, type, csvKey) {
      if (value === null || value === undefined || value === '') return '';
      if (type === 'probability' || type === 'spread_edge') return (Number(value) * 100).toFixed(2) + '%';
      if (csvKey === 'model_prediction' || csvKey === 'market_line' || csvKey === 'best_line' || csvKey === 'lookahead_line') return Number(value).toFixed(1);
      if (csvKey === 'market_price' || csvKey === 'best_price') return Number(value).toFixed(0);
      if (type === 'text') return String(value);
      if (type === 'decimal') return Number(value).toFixed(2);
      return value;
    }

    function buildPfrGameUrl(row) {
      const game = (row['game'] || '').toString().trim().toUpperCase();
      const gameDate = row['game_date_est'];

      if (!game || !gameDate || !game.includes('@')) return null;

      const parts = game.split('@');
      if (parts.length !== 2) return null;

      const homeTeamAbbr = parts[1].trim();
      const pfrAbbr = PFR_TEAM_ABBR[homeTeamAbbr];
      if (!pfrAbbr) return null;

      const dateStr = String(gameDate).trim().replace(/-/g, '');
      if (!/^\d{8}$/.test(dateStr)) return null;

      return `https://www.pro-football-reference.com/boxscores/${dateStr}0${pfrAbbr}.htm`;
    }

    function createGroupsFromRows(rows) {
      const map = new Map();
      rows.forEach((row, idx) => {
        const game = (row.game || '').toString().trim();
        const week = (row.week || '').toString().trim();
        const time = (row.game_time_est || '').toString().trim();
        const fallback = `${week}|${time}|${idx}`;
        const key = game || fallback;

        if (!map.has(key)) {
          map.set(key, { key, game, week, game_time_est: time, rows: [] });
        }
        map.get(key).rows.push(row);
      });

      return Array.from(map.values());
    }

    function sortGroups(groups, sortCfg) {
      if (!sortCfg || !sortCfg.key) {
        return groups.sort((a, b) => {
          const wa = Number(a.week ?? 9999);
          const wb = Number(b.week ?? 9999);
          if (wa !== wb) return wa - wb;
          return (a.game_time_est || '').localeCompare(b.game_time_est || '') ||
                 (a.game || '').localeCompare(b.game || '');
        });
      }

      const dir = sortCfg.direction === 'desc' ? -1 : 1;
      const key = sortCfg.key;

      return groups.sort((a, b) => {
        const aVals = a.rows.map(r => r[key]).filter(v => v !== null && v !== undefined && v !== '');
        const bVals = b.rows.map(r => r[key]).filter(v => v !== null && v !== undefined && v !== '');
        const aVal = aVals.length ? aVals[0] : null;
        const bVal = bVals.length ? bVals[0] : null;

        if (aVal === bVal) return 0;
        if (aVal === null) return 1;
        if (bVal === null) return -1;

        if (typeof aVal === 'number' && typeof bVal === 'number') {
          return (aVal < bVal ? -1 : 1) * dir;
        }
        return aVal.toString().localeCompare(bVal.toString()) * dir;
      });
    }

    function sortRowsWithinGroup(rows, sortCfg) {
      if (!sortCfg || !sortCfg.key) return rows;
      const key = sortCfg.key;
      const dir = sortCfg.direction === 'desc' ? -1 : 1;

      return rows.slice().sort((a, b) => {
        const aVal = a[key];
        const bVal = b[key];

        if (aVal === bVal) return 0;
        if (aVal === null || aVal === undefined || aVal === '') return 1;
        if (bVal === null || bVal === undefined || bVal === '') return -1;

        if (typeof aVal === 'number' && typeof bVal === 'number') {
          return (aVal < bVal ? -1 : 1) * dir;
        }
        return aVal.toString().localeCompare(bVal.toString()) * dir;
      });
    }

    function updateTableFromCSV() {
      Promise.all([parseCsvFromUrl(SPREADS_CSV_URL), parseCsvFromUrl(MODEL_CSV_URL)])
        .then(([spreadsResults, modelResults]) => {
          if (spreadsResults.meta && spreadsResults.meta.fields) {
            buildColumnMapping(spreadsResults.meta.fields);
          }

          rawData = spreadsResults.data || [];
          qbLookup = buildQbLookup(modelResults.data || []);

          hydrateTeams();
          renderTeamPicker();
          renderTable();
          updateTeamSummary();

          document.getElementById('status').textContent = 'Last updated: ' + new Date().toLocaleTimeString();
        })
        .catch((err) => {
          document.getElementById('status').textContent = 'Error loading data: ' + err.message;
        });
    }

    function hydrateTeams() {
      const set = new Set();
      rawData.forEach(row => {
        const t = (row['team'] || '').toString().trim();
        if (t) set.add(t);
      });

      allTeams = Array.from(set).sort((a, b) => a.localeCompare(b));
      const existing = new Set(allTeams);
      selectedTeams.forEach(t => { if (!existing.has(t)) selectedTeams.delete(t); });
    }

    function onTeamFilterInput() {
      renderTeamPicker();
    }

    function onTeamToggle(team, isChecked) {
      if (isChecked) selectedTeams.add(team);
      else selectedTeams.delete(team);

      updateTeamCount();
      updateTeamSummary();
      renderTable();
    }

    function clearTeamSelection() {
      selectedTeams.clear();
      document.getElementById('teamFilter').value = '';
      renderTeamPicker();
      updateTeamSummary();
      renderTable();
    }

    function selectVisibleTeams() {
      const filterText = document.getElementById('teamFilter').value.toLowerCase().trim();
      const visible = allTeams.filter(t => t.toLowerCase().includes(filterText));
      visible.forEach(t => selectedTeams.add(t));
      renderTeamPicker();
      updateTeamSummary();
      renderTable();
    }

    function updateTeamCount() {
      document.getElementById('teamCount').textContent = `Teams: ${allTeams.length} • Selected: ${selectedTeams.size}`;
    }

    function updateTeamSummary() {
      const el = document.getElementById('teamSummary');
      if (selectedTeams.size === 0) {
        el.textContent = 'All teams';
        return;
      }
      el.textContent = `${selectedTeams.size} team${selectedTeams.size === 1 ? '' : 's'} selected`;
    }

    function renderTeamPicker() {
      const container = document.getElementById('teamList');
      const filterText = document.getElementById('teamFilter').value.toLowerCase().trim();

      container.innerHTML = '';
      const filteredTeams = allTeams.filter(t => t.toLowerCase().includes(filterText));

      filteredTeams.forEach(team => {
        const id = 'team_' + team.replace(/[^a-z0-9]/gi, '_');

        const row = document.createElement('div');
        row.className = 'team-item';

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.id = id;
        cb.checked = selectedTeams.has(team);
        cb.onchange = () => onTeamToggle(team, cb.checked);

        const label = document.createElement('label');
        label.htmlFor = id;
        label.textContent = team;

        row.appendChild(cb);
        row.appendChild(label);
        container.appendChild(row);
      });

      updateTeamCount();
    }

    function onSort(key) {
      if (sortConfig.key === key) {
        sortConfig.direction = sortConfig.direction === 'asc' ? 'desc' : 'asc';
      } else {
        sortConfig.key = key;
        sortConfig.direction = 'asc';
      }
      renderTable();
    }

    function renderTable() {
      const head = document.getElementById('tableHead');
      const body = document.getElementById('tableBody');

      head.innerHTML = '';
      body.innerHTML = '';

      if (!rawData || rawData.length === 0) return;

      const activeCols = columnMapping.filter(col =>
        Object.prototype.hasOwnProperty.call(rawData[0], col.csv)
      );

      activeCols.forEach(col => {
        const th = document.createElement('th');
        th.textContent = col.display;
        th.onclick = () => onSort(col.csv);
        head.appendChild(th);
      });

      let processedData = rawData;
      if (selectedTeams.size > 0) {
        processedData = rawData.filter(row => selectedTeams.has((row['team'] || '').toString().trim()));
      }

      let groups = createGroupsFromRows(processedData);
      groups = sortGroups(groups, sortConfig);

      groups.forEach(group => {
        const gameHeaderTr = document.createElement('tr');
        gameHeaderTr.className = 'game-group-header';

        const gameTd = document.createElement('td');
        gameTd.colSpan = activeCols.length;

        const title = document.createElement('span');
        title.className = 'game-group-title';

        const firstRow = group.rows && group.rows.length ? group.rows[0] : null;
        const pfrUrl = firstRow ? buildPfrGameUrl(firstRow) : null;
        const gameText = group.game || 'Matchup';

        if (pfrUrl) {
          const a = document.createElement('a');
          a.href = pfrUrl;
          a.target = '_blank';
          a.rel = 'noopener noreferrer';
          a.textContent = gameText;
          title.appendChild(a);
        } else {
          title.textContent = gameText;
        }

        const meta = document.createElement('span');
        meta.className = 'game-meta';
        const weekPart = group.week ? `Week ${group.week}` : '';
        const timePart = group.game_time_est ? group.game_time_est : '';
        meta.textContent = [weekPart, timePart].filter(Boolean).join(' • ');

        gameTd.appendChild(title);
        if (meta.textContent) gameTd.appendChild(meta);
        gameHeaderTr.appendChild(gameTd);
        body.appendChild(gameHeaderTr);

        const sortedRows = sortRowsWithinGroup(group.rows, sortConfig);

        sortedRows.forEach((row, rowIdx) => {
          const tr = document.createElement('tr');
          tr.className = 'team-subrow';

          activeCols.forEach(col => {
            const td = document.createElement('td');
            const val = row[col.csv];
            const formatted = formatValue(val, col.type, col.csv);

            const hideGame = (col.csv === 'game');
            const hideGameTime = (col.csv === 'game_time_est');
            const hideWeekOnSecondRow = (col.csv === 'week' && rowIdx > 0);

            if (col.csv === 'team') {
              const teamKey = (val || '').toString().trim().toUpperCase();
              const url = TEAM_INJURY_URLS[teamKey];
              const logoUrl = row['team_logo_espn'];
              const qbName = qbLookup[teamKey];
              const wrapper = document.createElement('div');
              wrapper.className = 'team-cell';

              if (url) {
                const a = document.createElement('a');
                a.href = url;
                a.target = '_blank';
                a.rel = 'noopener noreferrer';
                a.className = 'team-link';

                if (logoUrl) {
                  const img = document.createElement('img');
                  img.src = logoUrl;
                  img.alt = `${formatted} logo`;
                  img.className = 'team-logo';
                  a.appendChild(img);
                }

                const span = document.createElement('span');
                span.textContent = formatted;
                a.appendChild(span);
                wrapper.appendChild(a);
              } else {
                const line = document.createElement('div');
                if (logoUrl) {
                  const img = document.createElement('img');
                  img.src = logoUrl;
                  img.alt = `${formatted} logo`;
                  img.className = 'team-logo';
                  line.appendChild(img);
                  line.appendChild(document.createTextNode(' '));
                }
                line.appendChild(document.createTextNode(formatted));
                wrapper.appendChild(line);
              }

              if (qbName) {
                const note = document.createElement('div');
                note.className = 'qb-note';
                note.textContent = `*Assumes ${qbName} is starting`;
                wrapper.appendChild(note);
              }

              td.appendChild(wrapper);
            } else if (hideGame || hideGameTime || hideWeekOnSecondRow) {
              td.textContent = '';
            } else {
              td.textContent = formatted;
            }

            if (col.type !== 'text') {
              td.classList.add('numeric');
            }

            if (!(hideGame || hideGameTime || hideWeekOnSecondRow) &&
                typeof val === 'number' &&
                col.type === 'spread_edge') {
              td.style.backgroundColor = getEdgeGradientColor(val, EDGE_THRESHOLD_PERCENT);
            }

            tr.appendChild(td);
          });

          body.appendChild(tr);
        });
      });
    }

    updateTableFromCSV();
    setInterval(updateTableFromCSV, REFRESH_INTERVAL);
  </script>
</body>
</html>
