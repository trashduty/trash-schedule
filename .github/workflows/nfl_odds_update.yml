name: NFL Odds Update

on:
  schedule:
    # Runs at 00:00 UTC every Tuesday (after Monday Night Football)
    - cron: '0 0 * * 2'
  workflow_dispatch: # Allows you to run it manually from the "Actions" tab

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-r-scripts:
    runs-on: ubuntu-latest
    env:
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install dependencies
        run: |
          Rscript -e 'install.packages(c("dplyr", "tidyr", "readr", "janitor", "nflreadr", "httr", "jsonlite", "glue", "lubridate", "purrr", "openxlsx"))'

      - name: Create data directories
        run: mkdir -p NFL_Odds/Data/cache

      - name: Run Line Movement Analysis
        run: Rscript NFL_Odds/R/nfl_line_movement.R

      - name: Run Odds Calculation
        run: Rscript NFL_Odds/R/nfl_odds.R
        continue-on-error: true

      - name: Commit and Push results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add NFL_Odds/Data/
          git commit -m "Update NFL Odds data [skip ci]" || echo "No changes to commit"
          git push

  run-cfb-scripts:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      CFBD_API_KEY: ${{ secrets.CFBD_API_KEY }}
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install CFB dependencies
        run: |
          Rscript -e 'install.packages(c("dplyr", "tidyr", "readr", "httr", "jsonlite", "glue", "lubridate", "purrr", "openxlsx", "cfbfastR"))'

      - name: Create CFB data directories
        run: mkdir -p CFB_Odds/Data/cache

      - name: Run CFB Line Movement Analysis
        run: Rscript CFB_Odds/R/cfb_line_movement.R

      - name: Commit and Push CFB results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add CFB_Odds/Data/
          git commit -m "Update CFB Odds data [skip ci]" || echo "No changes to commit"
          git push
