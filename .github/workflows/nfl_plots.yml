name: Update NFL Aggression Plots

on:
  workflow_dispatch:

jobs:
  update-plots:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Install System Dependencies for 'magick' and 'nflplotR'
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libmagick++-dev

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R Packages
        run: |
          install.packages(c("tidyverse", "nflfastR", "nflplotR", "scales"))
        shell: Rscript {0}

      - name: Run Plotting Script
        run: Rscript scripts/generate_nfl_aggression_plots.R

      - name: Commit and Push Plots
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/plots/nfl_2025/*.png
          git commit -m "Update NFL 2025 Aggression Plots [skip ci]" || echo "No changes to commit"
          git push
