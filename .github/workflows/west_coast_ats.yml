name: West Coast ATS Analysis

on:
  workflow_dispatch:

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R Packages
        run: |
          install.packages(c("dplyr", "stringr", "ggplot2", "scales", "openxlsx", "nflreadr", "lubridate"))
        shell: Rscript {0}

      - name: Run West Coast ATS Script
        run: Rscript NFL_Odds/R/west_coast_ats_analysis.R

      - name: Commit and Push Results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add NFL_Odds/Plots/WestCoastATS/*.png NFL_Odds/Data/WestCoast_ATS_Analysis.xlsx
          git commit -m "Update West Coast ATS analysis [skip ci]" || echo "No changes to commit"
          git push
