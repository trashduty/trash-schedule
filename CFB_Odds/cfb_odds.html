<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CFB Model Outputs</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 20px;
      background-color: #f4f7f6;
    }

    .last-updated {
      margin-bottom: 10px;
      font-style: italic;
      color: #666;
      font-size: 0.8rem;
    }

    .weather-link a {
      font-size: 1.1rem;
    }

    .subtabs {
      display: flex;
      gap: 0;
      margin-bottom: 16px;
      border-bottom: 1px solid #ddd;
    }

    .subtab {
      padding: 8px 12px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
      color: #666;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.2s;
    }

    .subtab:hover {
      color: #333;
    }

    .subtab.active {
      color: #2c3e50;
      border-bottom-color: #2c3e50;
    }

    .subtab-content {
      display: none;
    }

    .subtab-content.active {
      display: block;
    }

    .controls {
      margin-bottom: 14px;
      display: flex;
      align-items: flex-start;
      gap: 16px;
      flex-wrap: wrap;
    }

    button {
      border: 1px solid #ccc;
      background: #fff;
      border-radius: 6px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    button:hover { background: #f4f4f4; }

    .team-summary {
      font-size: 0.9rem;
      color: #333;
      padding-top: 8px;
    }

    .team-picker {
      width: 360px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.06);
      overflow: hidden;
      margin-top: 10px;
    }

    .team-picker[hidden] { display: none; }

    .team-picker-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px;
      border-bottom: 1px solid #eee;
      background: #fafafa;
      gap: 10px;
      flex-wrap: wrap;
    }

    .teamFilter {
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      width: 220px;
      font-size: 0.9rem;
      background: #fff;
    }

    .team-picker-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .team-list {
      max-height: 220px;
      overflow: auto;
      padding: 8px 10px;
    }

    .team-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 2px;
      font-size: 0.9rem;
      border-bottom: 1px dashed rgba(0,0,0,0.06);
    }
    .team-item:last-child { border-bottom: none; }

    .team-count {
      font-size: 0.85rem;
      color: #555;
      padding: 8px 10px 10px 10px;
      border-top: 1px solid #eee;
      background: #fafafa;
    }

    .table-container {
      overflow-x: auto;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      border-radius: 8px;
      background: white;
    }

    table {
      border-collapse: collapse;
      width: auto;
      font-size: 0.85rem;
    }

    th, td {
      padding: 10px;
      text-align: left;
      border-bottom: 1px solid #ddd;
      white-space: nowrap;
      vertical-align: top;
    }

    td.numeric {
      text-align: right;
    }

    table a {
      color: inherit;
      text-decoration: underline;
    }

    table a:hover {
      opacity: 0.75;
    }

    .team-cell {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 3px;
    }

    .team-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .team-logo {
      width: 22px;
      height: 22px;
      object-fit: contain;
      vertical-align: middle;
    }

    th {
      background-color: #2c3e50;
      color: white;
      position: sticky;
      top: 0;
      cursor: pointer;
      user-select: none;
    }

    th:after {
      content: ' \21D5';
      font-size: 0.7rem;
      opacity: 0.5;
    }

    tr:hover td {
      background-color: rgba(0,0,0,0.04) !important;
    }
  </style>
</head>

<body>
  <h2 style="margin-bottom:6px;">CFB Model Outputs</h2>
  <div class="last-updated" id="status">Loading data...</div>
  <div class="last-updated weather-link">
    <a href="https://www.covers.com/sport/ncaaf/weather" target="_blank" rel="noopener noreferrer">Weather Reports</a>
  </div>

  <div class="subtabs" id="subtabs"></div>

  <!-- Spreads Tab -->
  <div class="subtab-content" id="spreads-content">
    <div class="controls">
      <div>
        <button type="button" id="spreads-toggleTeamPickerBtn" onclick="toggleTeamPicker('spreads')">
          Select teams…
        </button>
      </div>
      <div class="team-summary" id="spreads-teamSummary">All teams</div>
    </div>

    <div class="team-picker" id="spreads-teamPicker" hidden>
      <div class="team-picker-header">
        <input class="teamFilter" id="spreads-teamFilter" type="text" placeholder="Type to find teams..." oninput="onTeamFilterInput('spreads')" />

        <div class="team-picker-actions">
          <button type="button" onclick="selectVisibleTeams('spreads')">Select visible</button>
          <button type="button" onclick="clearTeamSelection('spreads')">Clear</button>
          <button type="button" onclick="toggleTeamPicker('spreads', false)">Close</button>
        </div>
      </div>

      <div class="team-list" id="spreads-teamList"></div>
      <div class="team-count" id="spreads-teamCount">Teams: 0 • Selected: 0</div>
    </div>

    <div class="table-container">
      <table id="spreads-oddsTable">
        <thead><tr id="spreads-tableHead"></tr></thead>
        <tbody id="spreads-tableBody"></tbody>
      </table>
    </div>
  </div>

  <!-- Totals Tab -->
  <div class="subtab-content" id="totals-content">
    <div class="controls">
      <div>
        <button type="button" id="totals-toggleTeamPickerBtn" onclick="toggleTeamPicker('totals')">
          Select games…
        </button>
      </div>
      <div class="team-summary" id="totals-teamSummary">All games</div>
    </div>

    <div class="team-picker" id="totals-teamPicker" hidden>
      <div class="team-picker-header">
        <input class="teamFilter" id="totals-teamFilter" type="text" placeholder="Type to find games..." oninput="onTeamFilterInput('totals')" />

        <div class="team-picker-actions">
          <button type="button" onclick="selectVisibleTeams('totals')">Select visible</button>
          <button type="button" onclick="clearTeamSelection('totals')">Clear</button>
          <button type="button" onclick="toggleTeamPicker('totals', false)">Close</button>
        </div>
      </div>

      <div class="team-list" id="totals-teamList"></div>
      <div class="team-count" id="totals-teamCount">Games: 0 • Selected: 0</div>
    </div>

    <div class="table-container">
      <table id="totals-oddsTable">
        <thead><tr id="totals-tableHead"></tr></thead>
        <tbody id="totals-tableBody"></tbody>
      </table>
    </div>
  </div>

  <script>
    const CSV_URLS = {
      spreads: 'https://raw.githubusercontent.com/trashduty/trash-schedule/main/CFB_Odds/Data/spreads_odds.csv',
      totals: 'https://raw.githubusercontent.com/trashduty/trash-schedule/main/CFB_Odds/Data/totals_odds.csv',
      crosswalk: 'https://raw.githubusercontent.com/trashduty/trash-schedule/main/CFB_Odds/Data/CFB%20Teams%20Full%20Crosswalk.csv'
    };

    const REFRESH_INTERVAL = 60000;
    const EXCLUDED_COLUMNS = new Set(['logo', 'last_update_api', 'game_date_est', 'drive_bin']);
    const EDGE_THRESHOLD_PERCENT = 3;

    const tabState = {
      spreads: { rawData: [], allTeams: [], selectedTeams: new Set(), sortConfig: { key: null, direction: 'asc' }, columnMapping: [] },
      totals: { rawData: [], allGames: [], selectedGames: new Set(), sortConfig: { key: null, direction: 'asc' }, columnMapping: [] }
    };

    let teamLookup = {};

    function parseCsvFromUrl(url) {
      return fetch(url + '?t=' + Date.now())
        .then(response => {
          if (!response.ok) throw new Error('HTTP ' + response.status + ' for ' + url);
          return response.text();
        })
        .then(csvText => new Promise((resolve, reject) => {
          Papa.parse(csvText, {
            header: true,
            dynamicTyping: true,
            skipEmptyLines: true,
            complete: results => resolve(results),
            error: err => reject(err)
          });
        }));
    }

    function btbTeamToSlug(btbTeam) {
      return (btbTeam || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
    }

    function buildTeamLookup(crosswalkRows) {
      const lookup = {};
      crosswalkRows.forEach(row => {
        const fullName = (row['btb_team'] || '').toString().trim();
        const logoUrl = (row['logo'] || '').toString().trim();
        if (!fullName) return;
        const slug = btbTeamToSlug(fullName);
        const injuryUrl = slug
          ? `https://www.covers.com/sport/football/ncaaf/teams/main/${slug}/injuries`
          : null;
        lookup[fullName] = { displayName: fullName, injuryUrl, logoUrl };
      });
      return lookup;
    }

    function formatHeader(csvHeader) {
      if (csvHeader === 'game_time_est') return 'Game Time';
      return csvHeader
        .split('_')
        .map(word => word.charAt(0).toUpperCase() + word.slice(1))
        .join(' ');
    }

    function inferType(csvKey) {
      const k = csvKey.toLowerCase();
      if (k.includes('probability')) return 'probability';
      if (k.includes('edge')) return 'spread_edge';
      if (['week', 'game', 'team', 'game_time_est'].includes(k) || k.includes('book')) return 'text';
      return 'decimal';
    }

    function buildColumnMapping(headers) {
      const mapped = headers
        .filter(h => !EXCLUDED_COLUMNS.has(h))
        .map(h => ({
          csv: h,
          display: formatHeader(h),
          type: inferType(h)
        }));

      if (!headers.includes('lookahead_line')) {
        const mlIdx = mapped.findIndex(c => c.csv === 'market_line');
        if (mlIdx !== -1) {
          mapped.splice(mlIdx + 1, 0, {
            csv: 'lookahead_line',
            display: 'Lookahead Line',
            type: 'decimal'
          });
        }
      }

      const edgeIdx = mapped.findIndex(c => c.csv === 'edge');
      const gameTimeIdx = mapped.findIndex(c => c.csv === 'game_time_est');

      if (edgeIdx !== -1 && gameTimeIdx !== -1) {
        const [edgeCol] = mapped.splice(edgeIdx, 1);
        const updatedGameTimeIdx = mapped.findIndex(c => c.csv === 'game_time_est');
        mapped.splice(updatedGameTimeIdx + 1, 0, edgeCol);
      }

      const marketLineIdx = mapped.findIndex(c => c.csv === 'market_line');
      const modelPredictionIdx = mapped.findIndex(c => c.csv === 'model_prediction');

      if (marketLineIdx !== -1 && modelPredictionIdx !== -1) {
        const [marketLineCol] = mapped.splice(marketLineIdx, 1);
        const updatedModelPredictionIdx = mapped.findIndex(c => c.csv === 'model_prediction');
        mapped.splice(updatedModelPredictionIdx, 0, marketLineCol);
      }

      return mapped;
    }

    function setupSubtabs() {
      const container = document.getElementById('subtabs');
      container.innerHTML = '';

      const subtabs = [
        { id: 'spreads', label: 'Spreads' },
        { id: 'totals', label: 'Totals' }
      ];

      subtabs.forEach(subtab => {
        const button = document.createElement('button');
        button.className = 'subtab' + (subtab.id === 'spreads' ? ' active' : '');
        button.textContent = subtab.label;
        button.onclick = () => switchSubtab(subtab.id);
        container.appendChild(button);
      });

      document.getElementById('spreads-content').classList.add('active');
    }

    function switchSubtab(tabId) {
      document.querySelectorAll('.subtab-content').forEach(el => el.classList.remove('active'));
      document.getElementById(`${tabId}-content`).classList.add('active');

      document.querySelectorAll('.subtab').forEach(el => el.classList.remove('active'));
      event.target.classList.add('active');
    }

    function toggleTeamPicker(tabId, forceOpen) {
      const picker = document.getElementById(`${tabId}-teamPicker`);
      if (!picker) return;
      const isHidden = picker.hasAttribute('hidden');
      const open = (typeof forceOpen === 'boolean') ? forceOpen : isHidden;
      if (open) {
        picker.removeAttribute('hidden');
        setTimeout(() => document.getElementById(`${tabId}-teamFilter`)?.focus(), 0);
      } else {
        picker.setAttribute('hidden', '');
      }
    }

    function getEdgeGradientColor(value, thresholdPctPoints) {
      const pct = value * 100;
      const diff = pct - thresholdPctPoints;

      if (diff >= 0) {
        const lightness = Math.max(95 - diff * 8, 30);
        return `hsl(120, 70%, ${lightness}%)`;
      }

      const lightness = Math.max(95 - Math.abs(diff) * 8, 75);
      return `hsl(0, 80%, ${lightness}%)`;
    }

    function formatValue(value, type, csvKey) {
      if (value === null || value === undefined || value === '') return '';
      if (type === 'probability' || type === 'spread_edge') {
        return (Number(value) * 100).toFixed(2) + '%';
      }
      if (csvKey === 'model_prediction' || csvKey === 'market_line' || csvKey === 'best_line' || csvKey === 'lookahead_line') {
        return Number(value).toFixed(1);
      }
      if (csvKey === 'market_price' || csvKey === 'best_price') {
        return Number(value).toFixed(0);
      }
      if (type === 'text') return String(value);
      if (type === 'decimal') return Number(value).toFixed(2);
      return value;
    }

    function onTeamFilterInput(tabId) {
      renderTeamPicker(tabId);
    }

    function onTeamToggle(tabId, team, isChecked) {
      const state = tabState[tabId];
      if (isChecked) state.selectedTeams.add(team);
      else state.selectedTeams.delete(team);

      updateTeamCount(tabId);
      updateTeamSummary(tabId);
      renderTable(tabId);
    }

    function onGameToggle(tabId, game, isChecked) {
      const state = tabState[tabId];
      if (isChecked) state.selectedGames.add(game);
      else state.selectedGames.delete(game);

      updateTeamCount(tabId);
      updateTeamSummary(tabId);
      renderTable(tabId);
    }

    function clearTeamSelection(tabId) {
      const state = tabState[tabId];
      state.selectedTeams.clear();
      state.selectedGames.clear();
      const filterEl = document.getElementById(`${tabId}-teamFilter`);
      if (filterEl) filterEl.value = '';
      renderTeamPicker(tabId);
      updateTeamSummary(tabId);
      renderTable(tabId);
    }

    function selectVisibleTeams(tabId) {
      const state = tabState[tabId];
      const filterText = document.getElementById(`${tabId}-teamFilter`).value.toLowerCase().trim();
      
      if (tabId === 'totals') {
        const visible = state.allGames.filter(g => g.toLowerCase().includes(filterText));
        visible.forEach(g => state.selectedGames.add(g));
      } else {
        const visible = state.allTeams.filter(t => {
          const displayName = (teamLookup[t]?.displayName || t).toLowerCase();
          return displayName.includes(filterText) || t.toLowerCase().includes(filterText);
        });
        visible.forEach(t => state.selectedTeams.add(t));
      }
      
      renderTeamPicker(tabId);
      updateTeamSummary(tabId);
      renderTable(tabId);
    }

    function updateTeamCount(tabId) {
      const state = tabState[tabId];
      const countEl = document.getElementById(`${tabId}-teamCount`);
      if (!countEl) return;
      if (tabId === 'totals') {
        countEl.textContent = `Games: ${state.allGames.length} • Selected: ${state.selectedGames.size}`;
      } else {
        countEl.textContent = `Teams: ${state.allTeams.length} • Selected: ${state.selectedTeams.size}`;
      }
    }

    function updateTeamSummary(tabId) {
      const state = tabState[tabId];
      const el = document.getElementById(`${tabId}-teamSummary`);
      if (!el) return;
      const isSelected = tabId === 'totals' ? state.selectedGames.size : state.selectedTeams.size;
      if (isSelected === 0) {
        el.textContent = tabId === 'totals' ? 'All games' : 'All teams';
        return;
      }
      el.textContent = `${isSelected} ${tabId === 'totals' ? 'game' : 'team'}${isSelected === 1 ? '' : 's'} selected`;
    }

    function renderTeamPicker(tabId) {
      const state = tabState[tabId];
      const container = document.getElementById(`${tabId}-teamList`);
      if (!container) return;
      const filterText = document.getElementById(`${tabId}-teamFilter`).value.toLowerCase().trim();

      container.innerHTML = '';
      
      if (tabId === 'totals') {
        const filtered = state.allGames.filter(g => g.toLowerCase().includes(filterText));
        filtered.forEach(game => {
          const id = `${tabId}_game_${game.replace(/[^a-z0-9]/gi, '_')}`;

          const row = document.createElement('div');
          row.className = 'team-item';

          const cb = document.createElement('input');
          cb.type = 'checkbox';
          cb.id = id;
          cb.checked = state.selectedGames.has(game);
          cb.onchange = () => onGameToggle(tabId, game, cb.checked);

          const label = document.createElement('label');
          label.htmlFor = id;
          label.textContent = game;

          row.appendChild(cb);
          row.appendChild(label);
          container.appendChild(row);
        });
      } else {
        const filtered = state.allTeams.filter(t => {
          const displayName = (teamLookup[t]?.displayName || t).toLowerCase();
          return displayName.includes(filterText) || t.toLowerCase().includes(filterText);
        });

        filtered.forEach(team => {
          const displayName = teamLookup[team]?.displayName || team;
          const id = `${tabId}_team_${team.replace(/[^a-z0-9]/gi, '_')}`;

          const row = document.createElement('div');
          row.className = 'team-item';

          const cb = document.createElement('input');
          cb.type = 'checkbox';
          cb.id = id;
          cb.checked = state.selectedTeams.has(team);
          cb.onchange = () => onTeamToggle(tabId, team, cb.checked);

          const label = document.createElement('label');
          label.htmlFor = id;
          label.textContent = displayName;

          row.appendChild(cb);
          row.appendChild(label);
          container.appendChild(row);
        });
      }

      updateTeamCount(tabId);
    }

    function onSort(tabId, key) {
      const state = tabState[tabId];
      if (state.sortConfig.key === key) {
        state.sortConfig.direction = state.sortConfig.direction === 'asc' ? 'desc' : 'asc';
      } else {
        state.sortConfig.key = key;
        state.sortConfig.direction = 'asc';
      }
      renderTable(tabId);
    }

    function renderTable(tabId) {
      const state = tabState[tabId];
      const head = document.getElementById(`${tabId}-tableHead`);
      const body = document.getElementById(`${tabId}-tableBody`);

      if (!head || !body) return;

      head.innerHTML = '';
      body.innerHTML = '';

      if (!state.rawData || state.rawData.length === 0) return;

      const activeCols = state.columnMapping.filter(col =>
        Object.prototype.hasOwnProperty.call(state.rawData[0], col.csv)
      );

      activeCols.forEach(col => {
        const th = document.createElement('th');
        th.textContent = col.display;
        th.onclick = () => onSort(tabId, col.csv);
        head.appendChild(th);
      });

      let processedData = state.rawData;
      
      if (tabId === 'totals') {
        if (state.selectedGames.size > 0) {
          processedData = state.rawData.filter(row => state.selectedGames.has((row['game'] || '').toString().trim()));
        }
      } else {
        if (state.selectedTeams.size > 0) {
          processedData = state.rawData.filter(row => state.selectedTeams.has((row['team'] || '').toString().trim()));
        }
      }

      if (state.sortConfig.key) {
        processedData = processedData.slice().sort((a, b) => {
          const key = state.sortConfig.key;
          const valA = a[key];
          const valB = b[key];

          if (valA === valB) return 0;
          if (valA === null || valA === undefined) return 1;
          if (valB === null || valB === undefined) return -1;

          let comparison;
          if (typeof valA === 'number' && typeof valB === 'number') {
            comparison = valA < valB ? -1 : 1;
          } else {
            comparison = valA.toString().localeCompare(valB.toString());
          }

          return state.sortConfig.direction === 'asc' ? comparison : -comparison;
        });
      }

      processedData.forEach(row => {
        const tr = document.createElement('tr');

        activeCols.forEach(col => {
          const td = document.createElement('td');
          const val = row[col.csv];
          const formatted = formatValue(val, col.type, col.csv);

          if (col.csv === 'team' && tabId === 'spreads') {
            const teamKey = (val || '').toString().trim();
            const info = teamLookup[teamKey] || {};
            const displayName = info.displayName || teamKey;
            const url = info.injuryUrl || null;
            const logoUrl = info.logoUrl || row['logo'] || null;

            const wrapper = document.createElement('div');
            wrapper.className = 'team-cell';

            if (url) {
              const a = document.createElement('a');
              a.href = url;
              a.target = '_blank';
              a.rel = 'noopener noreferrer';
              a.className = 'team-link';

              if (logoUrl) {
                const img = document.createElement('img');
                img.src = logoUrl;
                img.alt = `${displayName} logo`;
                img.className = 'team-logo';
                a.appendChild(img);
              }

              const span = document.createElement('span');
              span.textContent = displayName;
              a.appendChild(span);

              wrapper.appendChild(a);
            } else {
              const line = document.createElement('div');
              if (logoUrl) {
                const img = document.createElement('img');
                img.src = logoUrl;
                img.alt = `${displayName} logo`;
                img.className = 'team-logo';
                line.appendChild(img);
                line.appendChild(document.createTextNode(' '));
              }
              line.appendChild(document.createTextNode(displayName));
              wrapper.appendChild(line);
            }

            td.appendChild(wrapper);
          } else {
            td.textContent = formatted;
          }

          if (col.type !== 'text') {
            td.classList.add('numeric');
          }

          if (typeof val === 'number' && col.type === 'spread_edge') {
            td.style.backgroundColor = getEdgeGradientColor(val, EDGE_THRESHOLD_PERCENT);
          }

          tr.appendChild(td);
        });

        body.appendChild(tr);
      });
    }

    function hydrateTeams() {
      const state = tabState.spreads;
      const set = new Set();
      state.rawData.forEach(row => {
        const t = (row['team'] || '').toString().trim();
        if (t) set.add(t);
      });

      state.allTeams = Array.from(set).sort((a, b) => {
        const nameA = (teamLookup[a]?.displayName || a).toLowerCase();
        const nameB = (teamLookup[b]?.displayName || b).toLowerCase();
        return nameA.localeCompare(nameB);
      });

      const existing = new Set(state.allTeams);
      state.selectedTeams.forEach(t => { if (!existing.has(t)) state.selectedTeams.delete(t); });
    }

    function hydrateGames() {
      const state = tabState.totals;
      const set = new Set();
      state.rawData.forEach(row => {
        const g = (row['game'] || '').toString().trim();
        if (g) set.add(g);
      });

      state.allGames = Array.from(set).sort((a, b) => a.localeCompare(b));

      const existing = new Set(state.allGames);
      state.selectedGames.forEach(g => { if (!existing.has(g)) state.selectedGames.delete(g); });
    }

    function updateTableFromCSV() {
      Promise.all([
        parseCsvFromUrl(CSV_URLS.spreads),
        parseCsvFromUrl(CSV_URLS.totals),
        parseCsvFromUrl(CSV_URLS.crosswalk)
      ])
        .then(([spreadsResults, totalsResults, crosswalkResults]) => {
          teamLookup = buildTeamLookup(crosswalkResults.data || []);

          // Spreads
          tabState.spreads.rawData = spreadsResults.data || [];
          tabState.spreads.columnMapping = buildColumnMapping(spreadsResults.meta?.fields || []);
          hydrateTeams();
          renderTeamPicker('spreads');
          renderTable('spreads');

          // Totals
          tabState.totals.rawData = totalsResults.data || [];
          tabState.totals.columnMapping = buildColumnMapping(totalsResults.meta?.fields || []);
          hydrateGames();
          renderTeamPicker('totals');
          renderTable('totals');

          document.getElementById('status').textContent =
            'Last updated: ' + new Date().toLocaleTimeString();
        })
        .catch((err) => {
          document.getElementById('status').textContent = 'Error loading data: ' + err.message;
        });
    }

    setupSubtabs();
    updateTableFromCSV();
    setInterval(updateTableFromCSV, REFRESH_INTERVAL);
  </script>
</body>
</html>
